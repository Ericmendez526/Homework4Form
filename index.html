<!DOCTYPE html>
<!--
Program name: Greatwood General Patient Intake Form
Author: Eric Y Mendez
Date: 05/03/26
Date last edited: 05/07/26
Description: A Patient intake form for a hospital
-->
<html lang ='en'>
        <head>
                <link rel="stylesheet" href="Homework4.css">
                <script src="Homework4.js" defer></script>
        </head>
        <body>
                <img src="doctorPicture.jpeg" alt="Logo For Hospital" height = "150" width="250">
                <form id = "signup" action= 'thankyou4.html'>
                                <h1> Greatwood General Patient Intake Form </h1> 
                                <!-- Date, Date Javascript is at bottom -->
                                <p>Today's Date: <span id="date"></span></p>
                                <center>
                                        <span id = "welcome1"></span>
                                        <span id = "welcome2"></span>
                                </center>
                                <div class = "iframe-container">
                                        <iframe class = "frame" src = "https://www.uh.edu/healthcenter/services/medical-services/index.php" frameborder = "0"></iframe>
                                </div>
                        <table>
                                <!-- Full Name -->
                                <tr>
                                <td><label for = 'FullName'> First Name / M.I / Last Name </label></td>
                                        <td>
                                <div class = "name-field">
                                <input type = "text" minlength = '1' maxlength = '30' size = '10' id = 'Fname' name = "First Name" 
                                Title = "Letters, dashes, and apostrophes only in First Name" 
                                pattern = "[a-zA-Z'-]{1-30}" onblur = "validateFname()" required>
                                <span class = 'error' id = "fname-error"></span>
                                </div>
                                <div class = "name-field">
                                <input type = "text" minlength = "1" maxlength = '1' size = '3' id = 'MI' name = "Middle Initial" 
                                title = "One letter only in Middle Initial" 
                                pattern = "[a-zA-Z]{1}" onblur = "validateMI()">
                                <span class = 'error' id = "MI-error"></span>
                                </div>
                                <div class = "name-field">
                                <input type = "text" minlength = "1" maxlength = '30' size = '10' id = 'Lname' name = "Last Name"
                                title = "Letters, dashes, and apostrophes only in Last Name" 
                                pattern = "[a-zA-Z'-]{1-30}" onblur = "validateLname()" required>
                                <span class = 'error' id = "Lname-error"></span>
                                </div>
                                        </td>
                                </tr>
                                <tr></tr>
                                <!-- DOB -->
                                <tr>
                                <td><label for = 'DOB'> Date Of Birth: </label></td>
                                <td><input type = "date" maxlength = '10' id = 'DOB' name = "Date Of Birth" placeholder = "MM/DD/YYYY" onblur = "validateDOB()" required>
                                <span class="error" id = "DOB-error"></span></td>
                                </tr>
                                <!-- Gender -->
                                <tr>
                                <td><label> Please Select Your Gender</label></td>
                                        <td><input type = 'radio' id = 'Male' name = 'Gender' value = 'Male' required>
                                        <label for = 'Male'> Male </label>
                                        <input type = 'radio' id = 'Female' name = 'Gender' value = 'Female'>
                                        <label for = 'Female'> Female </label></td>
                                </tr>
                                <tr></tr>
                                <!-- Weight -->
                                <tr>
                                <td><label for='weight'> Please enter your weight range.</label></td>
                                <td>
                                <input type='radio' name='Weight' id='less50' value='Less than 50' required>
                                <label for="less50"> Less than 50 </label>
                                <input type='radio' name='Weight' id='51-200' value='51 - 200'>
                                <label for='51-200'> 51 - 200 </label>
                                <input type='radio' name='Weight' id='201-350' value='201 - 350'>
                                <label for="201-350"> 201 - 350 </label>
                                <input type='radio' name='Weight' id='351-500' value='351 - 500'>
                                <label for='351-500'> 351 - 500 </label>
                                <input type='radio' name='Weight' id='500plus' value='500+'>
                                <label for="500plus"> 500+ </label>
                                </td>
                                </tr>
                                <!-- SSN -->
                                <tr>
                                <td><label for = 'SSN'> Social Security Number: </label></td>
                                <td><input type = "password" size = '10' maxlength = '11' id = 'SSN' name = "Social Security Number" title = "Numbers Only" onblur = "validateSSN()" required>
                                <span class = "error" id = "SSN-error"></span></td>
                                </tr>
                                <tr></tr>
                                <!-- Address Lines 1 and 2 -->
                                <tr>
                                <td><label for = 'AL1'> Address Line 1: </label></td>
                                <td><input type = "text" size = '35' maxlength = '30' id = 'AL1' name = "Address Line 1" title = "Letters, dashes and apostophes only" required onblur = "validateAL1()">
                                <span class = "error" id = "AL1-error"></span></td>
                                </tr>
                                <tr></tr>
                                <tr>
                                <td><label for = "AL2"> Address Line 2: </label></td>
                                <td><input type = "text" size = '35' maxlength = '30' id = 'AL2' name = "Address Line 2"></td>
                                </tr>
                                <tr></tr>
                                <!-- City -->
                                <tr>
                                <td><label>City / State / Zip Code</label></td>
                                <td>
                                <div class="CSZ-container">
                                <div class="CSZ-field">
                                <input type="text" size="10" maxlength="30" id="City" placeholder="City" onblur="validateCity()">
                                <span class="error" id="City-error"></span>
                                </div>
                                <select id="state" name = "State" required>
                                        <option value ="">Select a State</option>
                                        <option value="AL">Alabama</option>
                                        <option value="AK">Alaska</option>
                                        <option value="AZ">Arizona</option>
                                        <option value="AR">Arkansas</option>
                                        <option value="CA">California</option>
                                        <option value="CO">Colorado</option>
                                        <option value="CT">Connecticut</option>
                                        <option value="DE">Delaware</option>
                                        <option value="DC">District Of Columbia</option>
                                        <option value="FL">Florida</option>
                                        <option value="GA">Georgia</option>
                                        <option value="HI">Hawaii</option>
                                        <option value="ID">Idaho</option>
                                        <option value="IL">Illinois</option>
                                        <option value="IN">Indiana</option>
                                        <option value="IA">Iowa</option>
                                        <option value="KS">Kansas</option>
                                        <option value="KY">Kentucky</option>
                                        <option value="LA">Louisiana</option>
                                        <option value="ME">Maine</option>
                                        <option value="MD">Maryland</option>
                                        <option value="MA">Massachusetts</option>
                                        <option value="MI">Michigan</option>
                                        <option value="MN">Minnesota</option>
                                        <option value="MS">Mississippi</option>
                                        <option value="MO">Missouri</option>
                                        <option value="MT">Montana</option>
                                        <option value="NE">Nebraska</option>
                                        <option value="NV">Nevada</option>
                                        <option value="NH">New Hampshire</option>
                                        <option value="NJ">New Jersey</option>
                                        <option value="NM">New Mexico</option>
                                        <option value="NY">New York</option>
                                        <option value="NC">North Carolina</option>
                                        <option value="ND">North Dakota</option>
                                        <option value="OH">Ohio</option>
                                        <option value="OK">Oklahoma</option>
                                        <option value="OR">Oregon</option>
                                        <option value="PA">Pennsylvania</option>
                                        <option value="PR">Puerto Rico</option>
                                        <option value="RI">Rhode Island</option>
                                        <option value="SC">South Carolina</option>
                                        <option value="SD">South Dakota</option>
                                        <option value="TN">Tennessee</option>
                                        <option value="TX">Texas</option>
                                        <option value="UT">Utah</option>
                                        <option value="VT">Vermont</option>
                                        <option value="VA">Virginia</option>
                                        <option value="WA">Washington</option>
                                        <option value="WV">West Virginia</option>
                                        <option value="WI">Wisconsin</option>
                                        <option value="WY">Wyoming</option>
                                </select>
                                <div class="CSZ-field">
                                <input type="text" size="10" id="ZipCode" name = "Zip Code" maxlength="10" placeholder="Zip Code" onblur="validateZipCode()" required>
                                <span class="error" id="ZipCode-error"></span>
                                </div>
                                </div>
                                </td>
                                </tr>
                                <tr></tr>
                                <!-- Email Address -->
                                <tr>
                                <td><label for = 'Email'> Email: </label></td>
                                <td><input type = 'email' id = 'Email' name = "Email" size = '25' maxlength = '50' onblur="validateEmail()">
                                <span class = "error" id = "Email-error"></span></td>
                                </tr>
                                <tr></tr>
                                <!-- Phone Number -->
                                <tr>
                                <td><label>Phone Number:</label></td>
                                <td><input type = "text" name = "Phone Number" id = "phoneNum" title="Please enter your phone number" onblur="validatePhoneNumber()">
                                <span class = "error" id = "phoneNum-error"></span></td>
                                </tr>
                                <!-- Pain Slider -->
                                <tr>
                                <td><label for = 'pain'> Using this slider, what is your pain level? </label></td>
                                <td><input type = 'range' id = 'pain' name = "Range Slider" min = '1' max = '10' oninput = "rangeSliderLive(this.value)"> 
                                <span id = "painValue"> 5 </span></td>
                                </tr>
                                <tr></tr>
                                <!-- History -->
                                <tr>
                                <td><label> Do you / your family have a history of the following diseases? </label></td>
                                <td><input type = 'radio' name = 'History' id = 'heartDisease' value = "Heart Disease" required>
                                <label for = 'heartDisease'> Heart Disease </label>
                                <input type = 'radio' name = 'History' id = 'alzheimers' value = 'Alzheimers'>
                                <label for = 'alzheimers'> Alzheimer's Disease </label>
                                <input type = 'radio' name = 'History' id = 'diabetes' value = 'Diabetes'>
                                <label for = 'diabetes'> Diabetes </label>
                                <input type = 'radio' name = 'History' id = 'parkinsons' value = 'Parkinsons'>
                                <label for = 'parkinsons'> Parkinson's Disease </label>
                                <input type = 'radio' name = 'History' id = 'other' value = 'Other / More than one'>
                                <label for = 'other'> Other / More than one </label></td>
                                </tr>
                                <tr>
                                <td><label> If you selected other, or have a history of more than one, please list the diseases here. </label></td>
                                <td><input type = 'text' maxlength = '100' size = '50' id = 'otherTB' name = "Other diseases"></td>
                                </tr>
                                <tr></tr>
                                <!-- Checkbox -->
                                <tr>
                                <td><label> Which of the following diseases have you been vacinnated for (Check all that apply)</label></td>
                                <td><input type = 'checkbox' id = 'polio' name = 'Polio'>
                                <label for = "polio"> Polio </label>
                                <input type = 'checkbox' id = 'flu' name = 'Flu'>
                                <label for = "flu"> Flu</label>
                                <input type = 'checkbox' id = 'meningitis' name = 'Meningitis'>
                                <label for= "meningitis"> Meningitis </label>
                                <input type = 'checkbox' id = 'measles' name = 'Measles'>
                                <label for = "measles"> Measles </label>
                                <input type = 'checkbox' id = 'varicella' name = 'Varicella'>
                                <label for = "varicella"> Varicella </label>
                                <input type = 'checkbox' id = 'hepatitis' name = 'Hepatitis'>
                                <label for = "hepatitis"> Hepatitis </label>
                                <input type = 'checkbox' id = 'tetanus' name = 'Tetanus'>
                                <label for = "tetanus"> Tetanus</label>
                                <input type = 'checkbox' id = 'rotavirus' name = 'Rotavirus'>
                                <label for = "rotavirus"> Rotavirus </label>
                                <input type = 'checkbox' id = 'rubella' name = 'Rubella'>
                                <label for = "rubella"> Rubella </label>
                                <input type = 'checkbox' id = 'otherVaccine' name = 'otherVaccine'>
                                <label for = "otherVaccine"> Other </label>
                                <input type = "checkbox" id = 'unknown' name = 'unknown'>
                                <label for = "unknown" id = "unknown"> Unknown </label></td>
                                </tr>
                                <tr>
                                <td><label for = "otherVacinneTB"> If you selected other, please list any relevant vaccinations. </label></td>
                                <td><input type = "text" id = 'otherVaccineTB' name = "Other vaccinations textbox" size = '50'></td>
                                </tr>
                                <tr></tr>
                                <!-- Text Box -->
                                <tr>
                                <td><label for = 'textblock'> Is there any Additional Information relevant to your visit?</label></td>
                                <td><textarea name = 'Additional Information' rows = '3' cols = '50' required></textarea></td>
                                </tr>
                                <!-- Username and Password -->
                                <tr>
                                <td><label> Please Create an Account. </label></td>
                                </tr>
                                <tr>
                                <td><label for = "userID"> Username: </label></td>
                                <td><input type = "text" id = "Username" Name = "Username" 
                                title = "Username must contain at least five letters and cannot begin with a number" onblur="validateUsername()">
                                <span class = "error" id = "Username-error"></span></td>
                                </tr>
                                <tr>
                                <td><label for = "userID"> Password: </label></td>
                                <td><input type = "password" id = "Password" maxlength = "30" name = "Password" 
                                title = "Password must cointin at least 10 characters, one uppercase letter, one number, one lowercase letter and one special character"
                                onblur="validatePass()"
                                oninput="validatePass()"
                                onfocus="validatePass()"
                                required>
                                <span class = "error" id="Password-error"></span></td>
                                </tr>
                                <tr>
                                <td><label for = "userID"> Confirm Password: </label></td>
                                <td><input type = "password" id = "passwordConfirm" name = "Password Confirmation " maxlength = "30"  
                                title = "Please Re-enter your password" 
                                onblur="confirmPass()"
                                oninput="confirmPass()"
                                onfocus="confirmPass()"
                                required>
                                <span class = "error" id = "cPass-error"></span></td>
                                </tr>
                                <tr></tr>
                                <!-- Remember Me -->
                                 <tr>
                                        <td> <label for = "remember-me"> Remember Me </label></td>
                                        <td><input type = "checkbox" id = "remember-me" name = "remember-me" checked></td>
                                 </tr>
                                <!-- Submit Button, Clear Button and Review Button -->
                                <tr>
                                <td><input type = 'submit' id = "submit" value = 'Submit' disabled> 
                                <div style = "float: right;"><input type = 'Reset' id = "reset" value = 'Clear and Start Over'></div>
                                <input type="button" name = "review" value = "Review" onclick="reviewInput()">
                                <input type = "button" name = "validate" id = "validate" value = "Validate" onclick = "validateEverything()"></td>
                                </tr>
                                <!-- Date JavaScript-->
                        </table>
                        <div class = "pass-message">
                                <span id = "msg1"></span><br>
                                <span id = "msg2"></span><br>
                                <span id = "msg3"></span><br>
                                <span id = "msg4"></span><br>
                                <span id = "msg5"></span><br>
                                <span id = "msg6"></span><br>
                                <span id = "msg7"></span><br>
                                <span id = "cPass-error"></span><br>
                        </div>
                                <center>
                                        <p id = "showInput"></p>
                                </center>

                                <script>
                                        document.getElementById("date").innerHTML = new Date().toLocaleDateString();
                                </script>
                </form>
                                <!-- Footer -->
                                <iframe src = "footer.html" width="100%" height="150px" title="footer"></iframe>

                                <!-- Alert Box -->        
                                <div id = "alert-box">
                                        <div id = "alert-content">
                                                <h4>Please fill out all the required information</h4>
                                                <button id = "close-alert">Ok</button>
                                        </div>
                                </div>
        </body>
</html>
